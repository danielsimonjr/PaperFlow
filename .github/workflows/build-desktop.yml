name: Build Desktop

on:
  push:
    branches: [main, develop]
  # Not run on PRs: Electron packaging needs code-signing/notarization secrets
  # that PR runs don't have, so it always failed there. Validated post-merge
  # (push to main/develop), on release tags, and via manual dispatch instead.
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint

      - name: Run type checking
        run: npm run typecheck

      - name: Run tests
        run: npm run test:unit

      - name: Build Electron app
        run: npm run electron:build -- --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            dist/*.exe
            dist/*.msi
          if-no-files-found: warn
          retention-days: 7

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint

      - name: Run type checking
        run: npm run typecheck

      - name: Run tests
        run: npm run test:unit

      - name: Build Electron app
        run: npm run electron:build -- --mac --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Code signing (optional, requires certificates)
          # CSC_LINK: ${{ secrets.MAC_CERTS }}
          # CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTS_PASSWORD }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            dist/*.dmg
            dist/*.zip
          if-no-files-found: warn
          retention-days: 7

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      # electron-builder shells out to fpm for the deb/rpm/pacman targets, and fpm
      # needs the corresponding system packagers — which ubuntu-latest does NOT ship:
      #   pacman -> bsdtar   (libarchive-tools)
      #   rpm    -> rpmbuild (rpm)
      # Without them fpm dies with an EMPTY stderr and a bare "fpm process failed 1",
      # which is why this was so opaque. AppImage/deb happen to work without them,
      # so the build got most of the way through before dying on the pacman target.
      - name: Install Linux packaging tools (fpm backends)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libarchive-tools rpm

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint

      - name: Run type checking
        run: npm run typecheck

      - name: Run tests
        run: npm run test:unit

      - name: Build Electron app
        run: npm run electron:build -- --linux --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm
          if-no-files-found: warn
          retention-days: 7

  test-e2e-electron:
    needs: [build-windows, build-macos, build-linux]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps

      - name: Build app for testing
        run: npm run build && npm run electron:compile

      # NOTE: this step used to carry `continue-on-error: true`, which made it a
      # DECORATIVE gate — the Electron E2E suite could fail and the job would still
      # report success. It was masked further by the fact that this job never even ran:
      # it `needs:` the build jobs, and those had failed since 2026-06-27 on a missing
      # `author.email`, so E2E was SKIPPED, not ignored. With the builds fixed the suite
      # now runs and PASSES on all three platforms (ubuntu / windows / macos), so the
      # flag is removed and E2E is a real gate.
      - name: Run Electron E2E tests
        run: npm run test:e2e-electron

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.os }}
          path: |
            test-results/
            playwright-report/
          retention-days: 7
