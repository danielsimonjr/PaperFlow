name: Build Desktop

on:
  push:
    branches: [main, develop]
  # Not run on PRs: Electron packaging needs code-signing/notarization secrets
  # that PR runs don't have, so it always failed there. Validated post-merge
  # (push to main/develop), on release tags, and via manual dispatch instead.
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint

      - name: Run type checking
        run: npm run typecheck

      - name: Run tests
        run: npm run test:unit

      - name: Build Electron app
        run: npm run electron:build -- --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            dist/*.exe
            dist/*.msi
          if-no-files-found: warn
          retention-days: 7

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint

      - name: Run type checking
        run: npm run typecheck

      - name: Run tests
        run: npm run test:unit

      - name: Build Electron app
        run: npm run electron:build -- --mac --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Code signing (optional, requires certificates)
          # CSC_LINK: ${{ secrets.MAC_CERTS }}
          # CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTS_PASSWORD }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            dist/*.dmg
            dist/*.zip
          if-no-files-found: warn
          retention-days: 7

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      # electron-builder shells out to fpm for the deb/rpm/pacman targets, and fpm
      # needs the corresponding system packagers — which ubuntu-latest does NOT ship:
      #   pacman -> bsdtar   (libarchive-tools)
      #   rpm    -> rpmbuild (rpm)
      # Without them fpm dies with an EMPTY stderr and a bare "fpm process failed 1",
      # which is why this was so opaque. AppImage/deb happen to work without them,
      # so the build got most of the way through before dying on the pacman target.
      - name: Install Linux packaging tools (fpm backends)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libarchive-tools rpm

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint

      - name: Run type checking
        run: npm run typecheck

      - name: Run tests
        run: npm run test:unit

      - name: Build Electron app
        run: npm run electron:build -- --linux --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm
          if-no-files-found: warn
          retention-days: 7

# NOTE: this workflow deliberately has NO Electron E2E job.
#
# It used to carry `test-e2e-electron`, a duplicate of cross-platform.yml's `e2e-tests`:
# same specs, same three platforms. The copy here was strictly worse —
#   * it ran on `push` ONLY, i.e. AFTER merge, so it gated nothing; and
#   * its ubuntu leg had NO xvfb, so Electron could not open a window and all 43 tests
#     failed on every run. That was invisible until `continue-on-error: true` was removed.
#
# cross-platform.yml's `e2e-tests` is the real gate: it runs on pull_request, installs
# xvfb, and its three checks (`E2E Tests (linux|macos|windows)`) are REQUIRED on main.
# Do not re-add an E2E job here — you would pay for a second full matrix per push and
# gate nothing.
