name: Deploy to Production

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

# Electron's postinstall downloads a ~100 MB binary from GitHub releases. NOTHING in this
# workflow uses it — lint is eslint, typecheck is `tsc --noEmit`, test is vitest, build is the
# web vite build, and the e2e job drives Playwright CHROMIUM, not Electron. Downloading it in
# every job was pure waste AND a permanent transient-failure surface: on 2026-07-14 `npm ci`
# died with `TypeError: fetch failed` mid-download and took Type Check red on main with it.
#
# Do NOT set this in cross-platform.yml / build-desktop.yml — those genuinely launch Electron
# and package installers, and need the real binary.
env:
  ELECTRON_SKIP_BINARY_DOWNLOAD: '1'

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Run full CI first
  ci:
    uses: ./.github/workflows/ci.yml

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: ci
    environment:
      name: ${{ github.event.inputs.environment || 'production' }}
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build for production
        run: npm run build
        env:
          VITE_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          VITE_ANALYTICS_ENDPOINT: ${{ secrets.ANALYTICS_ENDPOINT }}
          VITE_APP_VERSION: ${{ github.ref_name }}

      # CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID have never been set on this repo, so this
      # workflow failed on EVERY push to main. A permanently-red check is not a signal — it is
      # noise that trains everyone to ignore CI, which is precisely how real E2E failures got
      # waved through here for days. Failing the run does not make the deploy happen; it only
      # hides the checks that matter.
      #
      # So: skip the deploy and say so LOUDLY (a ::warning:: is surfaced in the run summary),
      # rather than failing. The moment the secrets exist this deploys again with no further
      # change:
      #     gh secret set CLOUDFLARE_API_TOKEN  --repo danielsimonjr/PaperFlow
      #     gh secret set CLOUDFLARE_ACCOUNT_ID --repo danielsimonjr/PaperFlow
      #
      # NOTE: secrets are not available in a job-level `if:`, hence the step-output dance.
      - name: Check Cloudflare credentials
        id: cf
        run: |
          if [ -n "${{ secrets.CLOUDFLARE_API_TOKEN }}" ] && [ -n "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning title=Cloudflare deploy SKIPPED::CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID are not set on this repository, so the Pages deploy was skipped. The build itself succeeded. Set them with: gh secret set CLOUDFLARE_API_TOKEN --repo danielsimonjr/PaperFlow"
          fi

      - name: Deploy to Cloudflare Pages
        id: deploy
        if: steps.cf.outputs.configured == 'true'
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: paperflow
          directory: dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref_name }}

      - name: Create Sentry release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: getsentry/action-release@v1
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: paperflow
        with:
          environment: production
          version: ${{ github.ref_name }}
          sourcemaps: './dist/assets'

      - name: Post deployment notification
        if: success() && steps.cf.outputs.configured == 'true'
        run: |
          echo "Deployed to: ${{ steps.deploy.outputs.url }}"
          echo "Environment: ${{ github.event.inputs.environment || 'production' }}"
          echo "Version: ${{ github.ref_name }}"

  # Create GitHub release for tags
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: deploy
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
