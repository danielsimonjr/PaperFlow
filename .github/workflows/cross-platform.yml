name: Cross-Platform Testing

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      full_matrix:
        description: 'Run full platform matrix'
        type: boolean
        default: false

env:
  NODE_VERSION: '20'

jobs:
  # Build matrix for all platforms
  build:
    # Installer builds need signing secrets and are not worth spending on every PR, so they
    # stay post-merge / release-only. NOTE: e2e-tests deliberately does NOT depend on this
    # job — see the comment there.
    if: github.event_name != 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows builds
          #
          # NOTE: `nsis` is deliberately NOT built here. electron-builder.yml has the NSIS
          # target COMMENTED OUT of `win.target` ("NSIS installer disabled temporarily"), so
          # this workflow was demanding an artifact the project does not ship — and it failed
          # on every run.
          #
          # The failure is inside electron-builder's OWN installer template, not our code.
          # CI only ever reported the opaque:
          #     ⨯ makensis.exe process failed ERR_ELECTRON_BUILDER_CANNOT_EXECUTE
          #     Exit code:            <- empty
          # Reproducing the same command locally surfaces the actual NSIS compiler error:
          #     Usage: Call function_name | [:label_name]
          #     Error in macro MUI_FUNCTION_FINISHPAGE on macroline 264
          #     Error in macro MUI_PAGEDECLARATION_FINISH on macroline 31
          #     Error in macro MUI_UNPAGE_FINISH on macroline 6
          #     !include: error in script: "assistedInstaller.nsh" on line 81
          # i.e. a `Call` with an empty function name emitted by MUI's *uninstaller* finish
          # page, from app-builder-lib's own templates/nsis/assistedInstaller.nsh.
          # (`nsis.runAfterFinish: false` was tested and does NOT fix it.)
          #
          # Windows still ships: `msi` (built below, green) and `portable` (win.target).
          # Re-add an nsis leg here only once NSIS is genuinely re-enabled in
          # electron-builder.yml and the template error is resolved.
          - os: windows-latest
            platform: windows
            arch: x64
            target: msi

          # macOS builds
          - os: macos-14
            platform: macos
            arch: universal
            target: dmg

          # macos-13 has been RETIRED by GitHub. This job requested it and therefore
          # sat QUEUED FOREVER — and because every downstream job at the time declared
          # `needs: build`, the entire workflow could never complete and none of them
          # ever ran. Three runs were stacked up queued for hours on this one job while
          # the macos-14 leg beside it finished fine. (e2e-tests no longer declares
          # `needs: build` — that dependency was false — so it is no longer exposed to
          # this failure mode. release-candidate still is.)
          # macos-latest is arm64; electron-builder cross-builds the x64 dmg from it.
          - os: macos-latest
            platform: macos
            arch: x64
            target: dmg

          # Linux builds
          - os: ubuntu-22.04
            platform: linux
            arch: x64
            target: AppImage

          - os: ubuntu-22.04
            platform: linux
            arch: x64
            target: deb

          - os: ubuntu-22.04
            platform: linux
            arch: x64
            target: rpm

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.platform }} (${{ matrix.target }} ${{ matrix.arch }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libnotify-dev \
            libnss3 \
            libxss1 \
            libxtst6 \
            rpm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:unit

      - name: Build application
        # MUST be electron:build-web, NOT build. vite.config.ts sets
        # `base: isElectron ? './' : '/'`, where isElectron comes from ELECTRON=true.
        # `npm run build` therefore emits ABSOLUTE asset paths (/assets/...), which under
        # Electron's file:// protocol resolve to the DRIVE ROOT -> ERR_FILE_NOT_FOUND ->
        # the renderer never mounts -> the packaged app is a BLANK WINDOW.
        # electron-builder packages dist/ as-is, so this shipped broken installers.
        # (build-desktop.yml got this right via `npm run electron:build`, which calls
        # electron:build-web internally — hence one pipeline worked and these did not.)
        run: npm run electron:build-web && npm run electron:compile

      - name: Build installer
        run: |
          if [ "${{ matrix.platform }}" = "windows" ]; then
            npx electron-builder --win ${{ matrix.target }} --${{ matrix.arch }} --publish never
          elif [ "${{ matrix.platform }}" = "macos" ]; then
            npx electron-builder --mac ${{ matrix.target }} --${{ matrix.arch }} --publish never
          else
            npx electron-builder --linux ${{ matrix.target }} --${{ matrix.arch }} --publish never
          fi
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-${{ matrix.target }}-${{ matrix.arch }}
          path: |
            release/*.exe
            release/*.msi
            release/*.appx
            release/*.dmg
            release/*.pkg
            release/*.zip
            release/*.AppImage
            release/*.deb
            release/*.rpm
            release/*.snap
            release/*.yml
          if-no-files-found: warn
          retention-days: 14

  # E2E tests on all platforms.
  #
  # Runs on PULL REQUESTS as well as post-merge. It previously did not, and that is exactly how
  # a broken app reached main twice: the dead preload (#50) and the 9 IPC channels with no
  # handler behind them (#51) were BOTH caught only by the post-merge run — after they landed.
  #
  # It used to declare `needs: build` and download the installer artifact into release/. Both
  # were FALSE dependencies: every spec launches `dist-electron/main/index.js` (see
  # tests/e2e-electron/*.spec.ts), which this job builds from source in "Build for testing"
  # below. Nothing in the suite or in playwright.electron.config.ts ever reads release/. So this
  # job needs no signing secrets and no artifacts — the constraint it inherited from `build` was
  # never its own.
  #
  # Result: on a PR the `build` matrix is skipped but E2E still runs; on push/release E2E no
  # longer waits for the installers to finish.
  e2e-tests:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows

          - os: macos-14
            platform: macos

          - os: ubuntu-22.04
            platform: linux

    runs-on: ${{ matrix.os }}
    name: E2E Tests (${{ matrix.platform }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps

      - name: Install Linux display server
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Build for testing
        # MUST be electron:build-web, NOT build. `build` runs plain `vite build`,
        # and vite.config.ts sets `base: isElectron ? './' : '/'` where isElectron is
        # driven by ELECTRON=true / an "electron" npm lifecycle event. So `npm run build`
        # emits ABSOLUTE asset paths (/assets/...), which under Electron's file://
        # protocol resolve to the DRIVE ROOT -> ERR_FILE_NOT_FOUND -> the renderer never
        # mounts -> a completely BLANK window. `electron:build-web` sets ELECTRON=true,
        # giving relative './' paths. Verified: with `build` the window is empty and has
        # 0 buttons; with `electron:build-web` it renders and has the Open File button.
        run: npm run electron:build-web && npm run electron:compile

      - name: Run E2E tests (Linux)
        if: matrix.platform == 'linux'
        run: xvfb-run --auto-servernum npm run test:e2e-electron

      - name: Run E2E tests (Windows/macOS)
        if: matrix.platform != 'linux'
        run: npm run test:e2e-electron

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.platform }}
          path: |
            test-results/
            playwright-report/
          retention-days: 7

  # Visual regression tests
  release-candidate:
    # visual-tests / accessibility-audit were REMOVED — their test directories
    # (tests/visual/, tests/accessibility/) contain ZERO tests. See the note at
    # the bottom of this file.
    needs: [build, e2e-tests]
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.full_matrix == 'true')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: List artifacts
        run: find artifacts -type f -name "*.*" | head -50

      - name: Create release summary
        run: |
          echo "# Release Summary" > summary.md
          echo "" >> summary.md
          echo "## Build Artifacts" >> summary.md
          echo "" >> summary.md
          find artifacts -type f \( -name "*.exe" -o -name "*.msi" -o -name "*.dmg" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.rpm" \) -exec ls -lh {} \; >> summary.md

      - name: Upload release summary
        uses: actions/upload-artifact@v4
        with:
          name: release-summary
          path: summary.md
          retention-days: 30

  # Final release (only on release event)
  publish-release:
    needs: release-candidate
    if: github.event_name == 'release'
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: "*-*-*"
          merge-multiple: true

      - name: List files to upload
        run: ls -la artifacts/

      - name: Upload to release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/*.exe
            artifacts/*.msi
            artifacts/*.dmg
            artifacts/*.pkg
            artifacts/*.AppImage
            artifacts/*.deb
            artifacts/*.rpm
            artifacts/*.snap
            artifacts/*.yml
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# -----------------------------------------------------------------------------
# REMOVED 2026-07-13: visual-tests, accessibility-audit, performance-tests.
#
# They ran, respectively:
#     npx playwright test tests/visual/          -> "Error: No tests found."
#     npx playwright test tests/accessibility/   -> "Error: No tests found."
#     npx vitest run tests/performance/          -> no test files
#
# tests/visual/ and tests/accessibility/ DO NOT EXIST (0 tracked files), and
# tests/performance/ contains only benchmarks.ts (not a test file). These jobs
# asserted NOTHING and could never pass — which is exactly why they carried
# `continue-on-error: true`.
#
# A permanently-failing-but-ignored job is worse than no job: it makes the
# pipeline look like it covers visual regression and accessibility when it
# covers neither.
#
# RE-ADD them when the suites are actually written. Tracked in TODO.md.
# -----------------------------------------------------------------------------
