name: Deploy to Staging

on:
  push:
    branches: [develop]
  pull_request:
    branches: [main]

concurrency:
  group: staging-${{ github.ref }}
  cancel-in-progress: true

# Electron's postinstall downloads a ~100 MB binary from GitHub releases. NOTHING in this
# workflow uses it — lint is eslint, typecheck is `tsc --noEmit`, test is vitest, build is the
# web vite build, and the e2e job drives Playwright CHROMIUM, not Electron. Downloading it in
# every job was pure waste AND a permanent transient-failure surface: on 2026-07-14 `npm ci`
# died with `TypeError: fetch failed` mid-download and took Type Check red on main with it.
#
# Do NOT set this in cross-platform.yml / build-desktop.yml — those genuinely launch Electron
# and package installers, and need the real binary.
env:
  ELECTRON_SKIP_BINARY_DOWNLOAD: '1'

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    needs: lint-and-test
    environment:
      name: staging
      url: ${{ steps.deploy.outputs.url }}
    outputs:
      # These were NEVER declared, yet e2e-staging consumes
      # `needs.deploy-preview.outputs.url` as its BASE_URL — so BASE_URL was always the
      # empty string and the staging E2E could not have worked even on a successful deploy.
      # It only ever *looked* fine because this job failed first (missing Cloudflare creds),
      # which skipped e2e-staging entirely.
      url: ${{ steps.deploy.outputs.url }}
      deployed: ${{ steps.cf.outputs.configured }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_APP_VERSION: ${{ github.sha }}

      # Same story as deploy.yml: CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID have never been
      # set on this repo, so `Deploy Preview` failed on EVERY run. A permanently-red check is
      # noise, not a signal — it trains people to skim past red, which is how this repo's real
      # failures went unnoticed. Skip loudly instead of failing; the build above still gates.
      # Resumes automatically once the secrets exist.
      # (Secrets are unavailable in a job-level `if:`, hence the step-output guard.)
      - name: Check Cloudflare credentials
        id: cf
        run: |
          if [ -n "${{ secrets.CLOUDFLARE_API_TOKEN }}" ] && [ -n "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning title=Cloudflare preview deploy SKIPPED::CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID are not set on this repository, so the preview deploy was skipped. The build itself succeeded."
          fi

      - name: Deploy to Cloudflare Pages (Preview)
        id: deploy
        if: steps.cf.outputs.configured == 'true'
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: paperflow
          directory: dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.head_ref || github.ref_name }}

      - name: Comment on PR
        # NOTE: this step already had an `if:`. Both conditions must be ANDed into ONE key —
        # a duplicate `if:` is accepted silently by PyYAML (last wins) but REJECTED by GitHub
        # with a bare "This run likely failed because of a workflow file issue."
        if: github.event_name == 'pull_request' && steps.cf.outputs.configured == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Preview Deployment

              Your changes have been deployed to a preview environment:

              **URL:** ${{ steps.deploy.outputs.url }}

              This preview will be automatically updated with new commits to this PR.`
            })

  e2e-staging:
    name: E2E Tests (Staging)
    runs-on: ubuntu-latest
    needs: deploy-preview
    # Only run when a preview was ACTUALLY deployed. Without the Cloudflare creds the
    # deploy is skipped, so there is no URL to test — running anyway just fails on an empty
    # BASE_URL, which is noise, not a signal.
    if: needs.deploy-preview.outputs.deployed == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests against staging
        run: npm run test:e2e
        env:
          BASE_URL: ${{ needs.deploy-preview.outputs.url }}
